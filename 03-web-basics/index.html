<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web のしくみ</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #4ade80;
      --warn: #fbbf24;
      --err: #f87171;
      --line: #334155;
      --panel: #0b1220;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .wrap { width: 100%; max-width: 1000px; }

    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    p.lead { color: var(--muted); margin-top: 0; }

    /* --- URL バー --- */
    .urlbar { display: flex; gap: 8px; margin: 16px 0 20px; flex-wrap: wrap; }
    .urlbar input {
      flex: 1;
      min-width: 240px;
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font-size: 0.95rem;
    }
    button {
      padding: 11px 20px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #05202b;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover { filter: brightness(1.1); }
    button.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- 横並びパイプライン（左→右に流れる） --- */
    .pipeline {
      display: flex;
      align-items: stretch;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 20px;
    }
    .step {
      flex: 1 1 0;
      min-width: 128px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 14px 8px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      opacity: 0.4;
      cursor: pointer;
      transition: opacity 0.3s, border-color 0.3s, transform 0.2s;
    }
    .step.active { opacity: 1; border-color: var(--accent); transform: translateY(-3px); }
    .step.done { opacity: 1; border-color: var(--ok); }
    .step .num {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--line); font-weight: bold; font-size: 0.9rem;
    }
    .step.active .num { background: var(--accent); color: #05202b; }
    .step.done .num { background: var(--ok); color: #05202b; }
    .step .title { font-weight: bold; font-size: 0.85rem; }
    .step .desc { color: var(--muted); font-size: 0.72rem; line-height: 1.3; }
    .arrow {
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 1.3rem; flex: 0 0 auto;
    }

    /* --- 出力（全幅） --- */
    .card { background: var(--card); border-radius: 14px; padding: 18px; }
    .card h2 { font-size: 1rem; margin: 0 0 14px; color: var(--accent); }
    .output { min-height: 240px; }
    .out-card {
      border-radius: 10px;
      background: var(--panel);
      border-left: 5px solid var(--accent);
      padding: 14px;
      margin-bottom: 12px;
      animation: fade 0.35s ease;
    }
    .out-card.ok  { border-left-color: var(--ok); }
    .out-card.err { border-left-color: var(--err); }
    .out-card .out-title { font-weight: bold; margin-bottom: 8px; }
    .out-card .out-title .n {
      display: inline-block; width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #05202b; text-align: center; line-height: 22px;
      font-size: 0.8rem; margin-right: 8px;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    pre {
      margin: 8px 0 0; padding: 12px;
      background: #060b16; border: 1px solid var(--line); border-radius: 8px;
      color: #cbd5e1; font-size: 0.82rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    }
    .kv { display: grid; grid-template-columns: 88px 1fr; gap: 4px 10px; font-size: 0.86rem; margin-top: 6px; }
    .kv .k { color: var(--muted); }
    .kv .v { color: var(--text); word-break: break-all; }
    .note { color: var(--muted); font-size: 0.8rem; margin-top: 8px; }
    .placeholder { color: var(--muted); font-size: 0.9rem; }

    /* 疑似ブラウザ */
    .browser { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-top: 8px; background: #fff; }
    .browser .bar { background: #e2e8f0; padding: 6px 10px; display: flex; gap: 6px; align-items: center; }
    .browser .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; }
    .browser .addr { flex: 1; background: #fff; border-radius: 999px; padding: 3px 10px; font-size: 0.72rem; color: #334155; }
    .browser iframe { width: 100%; height: 300px; border: 0; background: #fff; display: block; }
    a.link { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Web のしくみ</h1>
    <p class="lead">好きな URL を入れて「実行」を押すと、名前解決 → リクエスト → レスポンス → 表示の流れが左から右に進みます。</p>

    <div class="urlbar">
      <input id="url" type="text" value="https://example.com" aria-label="URL" />
      <button id="go">実行</button>
      <button id="reset" class="ghost">リセット</button>
    </div>

    <!-- 横並びの流れ（左→右） -->
    <div class="pipeline" id="steps">
      <div class="step" data-step="0">
        <div class="num">1</div>
        <div class="title">URL を解釈</div>
        <div class="desc">どこに・どうやって<br>接続するか読み取る</div>
      </div>
      <div class="arrow">→</div>
      <div class="step" data-step="1">
        <div class="num">2</div>
        <div class="title">DNS で名前解決</div>
        <div class="desc">ホスト名<br>→ IP アドレス</div>
      </div>
      <div class="arrow">→</div>
      <div class="step" data-step="2">
        <div class="num">3</div>
        <div class="title">リクエスト送信</div>
        <div class="desc">その IP に<br>「ください」</div>
      </div>
      <div class="arrow">→</div>
      <div class="step" data-step="3">
        <div class="num">4</div>
        <div class="title">レスポンス受信</div>
        <div class="desc">ステータス＋<br>本文が返る</div>
      </div>
      <div class="arrow">→</div>
      <div class="step" data-step="4">
        <div class="num">5</div>
        <div class="title">画面を表示</div>
        <div class="desc">HTML を解析<br>して描画</div>
      </div>
    </div>

    <!-- 出力（全幅） -->
    <section class="card output">
      <h2>出力結果</h2>
      <div id="output"><p class="placeholder">「実行」を押すと、ここに各ステップの結果が順に表示されます。上の各ステップをクリックすると個別に再表示できます。</p></div>
    </section>
  </div>

  <script>
    // HTML エスケープ（表示するURLの文字をそのまま埋め込まないための安全対策）
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    const urlInput = document.getElementById('url');
    const goBtn = document.getElementById('go');
    const resetBtn = document.getElementById('reset');
    const stepEls = Array.from(document.querySelectorAll('.step'));
    const outputEl = document.getElementById('output');

    let running = false;
    const results = {};   // ステップ番号 → 出力HTML を保存（クリックで再表示用）

    function setStepState(i, state) {
      const el = stepEls[i];
      el.classList.remove('active', 'done');
      if (state) el.classList.add(state);
    }

    function appendOutput(i, title, bodyHtml, level) {
      const html =
        '<div class="out-card ' + (level || '') + '">' +
        '<div class="out-title"><span class="n">' + (i + 1) + '</span>' + esc(title) + '</div>' +
        bodyHtml + '</div>';
      results[i] = html;
      outputEl.insertAdjacentHTML('beforeend', html);
    }

    // クリックで個別ステップの出力を再表示
    stepEls.forEach((el, i) => {
      el.addEventListener('click', () => {
        if (running || !results[i]) return;
        outputEl.innerHTML = results[i];
      });
    });

    const wait = (ms) => new Promise((r) => setTimeout(r, ms));

    async function run() {
      if (running) return;
      running = true;
      goBtn.disabled = true;

      // 初期化
      stepEls.forEach((_, i) => setStepState(i, null));
      Object.keys(results).forEach((k) => delete results[k]);
      outputEl.innerHTML = '';

      // 入力チェック
      let url;
      try {
        url = new URL(urlInput.value.trim());
      } catch {
        outputEl.innerHTML =
          '<div class="out-card err"><div class="out-title">URL の形式が正しくありません</div>' +
          '<p class="note">例：https://example.com のように入力してください。</p></div>';
        running = false; goBtn.disabled = false;
        return;
      }

      const host = url.hostname;
      const scheme = url.protocol.replace(':', '');
      const port = url.port || (scheme === 'https' ? '443' : '80');
      const path = url.pathname + url.search || '/';

      // ---- ステップ1：URL を解釈 ----
      setStepState(0, 'active');
      await wait(500);
      appendOutput(0, 'URL を解釈しました',
        '<div class="kv">' +
        '<div class="k">スキーム</div><div class="v">' + esc(scheme) + '</div>' +
        '<div class="k">ホスト名</div><div class="v">' + esc(host) + '</div>' +
        '<div class="k">ポート</div><div class="v">' + esc(port) + '</div>' +
        '<div class="k">パス</div><div class="v">' + esc(path) + '</div>' +
        '</div>', 'ok');
      setStepState(0, 'done');

      // ---- ステップ2：DNS で名前解決（本物のDNS-over-HTTPSを使用）----
      setStepState(1, 'active');
      let ip = null;
      try {
        const res = await fetch('https://dns.google/resolve?name=' + encodeURIComponent(host) + '&type=A');
        const data = await res.json();
        const answer = (data.Answer || []).filter((a) => a.type === 1); // type 1 = A レコード
        if (answer.length) ip = answer.map((a) => a.data);
      } catch { /* オフライン等は下でフォールバック */ }
      await wait(400);
      if (ip) {
        appendOutput(1, 'DNS で名前解決できました（本物の問い合わせ）',
          '<div class="kv">' +
          '<div class="k">ホスト名</div><div class="v">' + esc(host) + '</div>' +
          '<div class="k">IP アドレス</div><div class="v">' + esc(ip.join(', ')) + '</div>' +
          '</div>' +
          '<p class="note">Google の DNS-over-HTTPS（dns.google）に実際に問い合わせた結果です。</p>', 'ok');
      } else {
        ip = ['93.184.216.34']; // 例示用フォールバック
        appendOutput(1, 'DNS で名前解決（例示）',
          '<div class="kv">' +
          '<div class="k">ホスト名</div><div class="v">' + esc(host) + '</div>' +
          '<div class="k">IP アドレス</div><div class="v">' + esc(ip[0]) + '（例）</div>' +
          '</div>' +
          '<p class="note">本物の問い合わせに失敗したため、例のIPを表示しています。</p>');
      }
      setStepState(1, 'done');

      // ---- ステップ3：HTTP リクエスト送信 ----
      setStepState(2, 'active');
      await wait(400);
      const reqText =
        'GET ' + path + ' HTTP/1.1\n' +
        'Host: ' + host + '\n' +
        'User-Agent: Mozilla/5.0 (learning-demo)\n' +
        'Accept: text/html\n' +
        'Connection: keep-alive\n';
      appendOutput(2, host + '（' + ip[0] + '）に送るリクエスト',
        '<pre>' + esc(reqText) + '</pre>' +
        '<p class="note">ブラウザはこの文面を ' + esc(ip[0]) + ':' + esc(port) + ' に送っています。</p>');
      setStepState(2, 'done');

      // ---- ステップ4：HTTP レスポンス受信 ----
      setStepState(3, 'active');
      await wait(400);
      const resText =
        'HTTP/1.1 200 OK\n' +
        'Content-Type: text/html; charset=UTF-8\n' +
        'Content-Length: 1256\n' +
        'Date: ' + new Date().toUTCString() + '\n' +
        '\n' +
        '<!DOCTYPE html><html>...（HTML 本文）...</html>';
      appendOutput(3, 'サーバーからのレスポンス',
        '<pre>' + esc(resText) + '</pre>' +
        '<p class="note">※ ブラウザのセキュリティ（CORS）により、他サイトの中身を JavaScript から直接読むことはできません。実際のステータスやヘッダーは DevTools の Network タブで確認できます。上は代表的な例です。</p>');
      setStepState(3, 'done');

      // ---- ステップ5：画面を表示 ----
      setStepState(4, 'active');
      await wait(400);
      const frameId = 'frame-' + Date.now();
      appendOutput(4, '画面を表示（レンダリング）',
        '<div class="browser">' +
        '<div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>' +
        '<span class="addr">' + esc(url.href) + '</span></div>' +
        '<iframe id="' + frameId + '" title="preview"></iframe>' +
        '</div>' +
        '<p class="note">埋め込み表示をブロックするサイトでは白いままになります。その場合は ' +
        '<a class="link" href="' + esc(url.href) + '" target="_blank" rel="noopener">新しいタブで開く</a> と見られます。</p>');
      // iframe の src はプロパティ経由で設定（安全のため）
      const frame = document.getElementById(frameId);
      if (frame) frame.src = url.href;
      setStepState(4, 'done');

      running = false;
      goBtn.disabled = false;
    }

    goBtn.addEventListener('click', run);
    urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') run(); });
    resetBtn.addEventListener('click', () => {
      if (running) return;
      stepEls.forEach((_, i) => setStepState(i, null));
      Object.keys(results).forEach((k) => delete results[k]);
      outputEl.innerHTML = '<p class="placeholder">「実行」を押すと、ここに各ステップの結果が順に表示されます。上の各ステップをクリックすると個別に再表示できます。</p>';
    });
  </script>
</body>
</html>
